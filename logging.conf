[loggers]
keys=root, energy_forecasting, tensorflow

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_energy_forecasting]
level=INFO
handlers=consoleHandler
qualname=energy_forecasting
propagate=0

[logger_tensorflow]
level=ERROR
handlers=consoleHandler
qualname=tensorflow

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(message)s
